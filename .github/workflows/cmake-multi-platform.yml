name: Build & Test

# Trigger: run automatically whenever code is pushed to main, or when a pull
# request targets main. This is the core CI loop — every change gets verified
# before it can land.
on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Build matrix: compile on multiple OS/compiler combinations so we catch
    # platform-specific bugs early instead of after a release.
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false  # If one platform fails, keep running the others.

      matrix:
        include:
          # Linux — two compilers to catch different classes of warnings/errors.
          - os: ubuntu-latest
            build_type: Release
            c_compiler: gcc
            cpp_compiler: g++
            artifact_name: catcat-linux-gcc

          - os: ubuntu-latest
            build_type: Release
            c_compiler: clang
            cpp_compiler: clang++
            artifact_name: catcat-linux-clang

          # macOS Apple Silicon
          - os: macos-14
            build_type: Release
            c_compiler: clang
            cpp_compiler: clang++
            architecture: arm64
            artifact_name: catcat-macos-arm64

    steps:
    # Step 1 — Download the source code onto the runner machine.
    - name: Check out source code
      uses: actions/checkout@v4

    # Step 2 — Store the build directory path so later steps can reference it.
    - name: Set build directory path
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    # Step 3 — Run CMake to configure the build system.
    # This resolves dependencies (FTXUI, nlohmann_json, miniaudio) and generates
    # the Makefile/Ninja files used by the next step.
    - name: Configure (CMake)
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DENABLE_AUDIO=ON \
          -DBUILD_TESTS=OFF \
          -S ${{ github.workspace }}

    # Step 4 — Compile the project. Warnings are treated as errors (-Werror),
    # so this fails fast on any new compiler warning introduced by a change.
    - name: Compile
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    # Step 5 — Run the test suite. --output-on-failure prints test output only
    # when something breaks, making failures easy to read in the log.
    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

    # Step 6 — Upload the compiled bundle as a downloadable artifact.
    # Anyone on the team can grab a binary from the Actions tab without
    # needing to build the project themselves.
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ steps.strings.outputs.build-output-dir }}/catcat_bundle.zip
        if-no-files-found: error
  release:
    name: Publish Release
    needs: build                        # only runs if all build matrix jobs pass
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
    - name: Check out source code
      uses: actions/checkout@v4

    - name: Configure (CMake)
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DENABLE_AUDIO=ON \
          -DBUILD_TESTS=OFF \
          -S ${{ github.workspace }}

    - name: Compile & Package
      run: cmake --build build --target package_catcat

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: build/catcat_bundle.zip
        generate_release_notes: true    # auto-generates notes from commits since last tag
